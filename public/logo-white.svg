<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <clipPath id="circleClip">
      <circle cx="200" cy="90" r="76" />
    </clipPath>
  </defs>

  <!-- Circle Outline -->
  <path d="M 146 144 A 76 76 0 1 1 254 144" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="square" />

  <!-- Inner Content -->
  <g clip-path="url(#circleClip)">
    <!-- Red House -->
    <path d="M 100 120 L 150 120 C 165 120, 165 95, 180 95 L 205 95 C 220 95, 220 75, 235 75 L 300 75 L 300 60 L 200 10 L 100 60 Z" fill="#ED1C24" />
    
    <!-- Chimney -->
    <rect x="235" y="15" width="15" height="40" fill="#ED1C24" />
    
    <!-- White Bottom Right Area (was black) -->
    <path d="M 100 145 L 155 145 C 175 145, 175 115, 195 115 L 215 115 C 230 115, 230 95, 245 95 L 300 95 L 300 200 L 100 200 Z" fill="#FFFFFF" />
    
    <!-- Dark Winding Path (was white) -->
    <path d="M 100 120 L 150 120 C 165 120, 165 95, 180 95 L 205 95 C 220 95, 220 75, 235 75 L 300 75 L 300 95 L 245 95 C 230 95, 230 115, 215 115 L 195 115 C 175 115, 175 145, 155 145 L 100 145 Z" fill="#002045" />
  </g>

  <!-- Text: WESTROM GROUP -->
  <g transform="translate(200, 190)" font-family="Arial, sans-serif" font-weight="900" font-size="36">
    <text x="-160" y="0" fill="#FFFFFF">W</text>
    
    <!-- Custom E -->
    <g transform="translate(-115, -26)">
      <rect x="0" y="0" width="20" height="6" fill="#ED1C24" />
      <rect x="0" y="10" width="20" height="6" fill="#ED1C24" />
      <rect x="0" y="20" width="20" height="6" fill="#ED1C24" />
    </g>

    <text x="-80" y="0" fill="#FFFFFF" letter-spacing="2">STROM GROUP</text>
  </g>

  <!-- Text: REAL ESTATE & PROPERTY MANAGEMENT -->
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" letter-spacing="1.5" fill="#FFFFFF">
    REAL ESTATE &amp; PROPERTY MANAGEMENT
  </text>
</svg>
