<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002045">
    <title>Westrom Owner Advisory Hub</title>
    <meta name="description" content="Self-service resources to help Texas rental property owners optimize property taxes and insurance." />
    
    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Westrom Owner Tax Resources" />
    <meta property="og:description" content="Self-service resources to help Texas rental property owners optimize property taxes and insurance." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Westrom Owner Tax Resources" />
    <meta property="twitter:description" content="Self-service resources to help Texas rental property owners optimize property taxes and insurance." />
    <meta property="twitter:image" content="/logo.png" />
    <!-- Preconnect to Loom CDN so the iframe starts loading without DNS/TLS delay -->
    <link rel="preconnect" href="https://www.loom.com" crossorigin />
    <link rel="preconnect" href="https://cdn.loom.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.loom.com" />
    <link rel="dns-prefetch" href="https://cdn.loom.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
