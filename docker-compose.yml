# Docker Compose v2+ — no 'version' key needed (deprecated in Compose v2)
# All AI providers are cloud APIs — no local model services needed.
# Copy api/.env.example to api/.env and fill in your API keys before running.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    environment:
      - API_UPSTREAM=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # nginx:alpine ships with wget
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      # Cloud AI providers — set these in api/.env (see api/.env.example)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      # node:20-alpine ships with wget
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
